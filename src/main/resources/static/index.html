<!DOCTYPE html>
<html>
<head>
    <title>SET Game</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<h1 class="title">SET-Style Multiplayer Card Game</h1>
<p class="subtitle">Join with a session code. No login required.</p>

<div class="container">

    <div class="card-box">
        <h2>Create a game</h2>

        <input placeholder="Host name">
        <button class="primary" onclick="createGame()">Create session</button>
    </div>

    <div class="card-box">
        <h2>Join a game</h2>

        <input id="name" placeholder="Your name">
        <input id="sessionId" placeholder="Enter session ID">

        <button class="primary" onclick="joinGame()">Join session</button>
    </div>
    <div id="waitingScreen" class="waiting hidden">
    <div class="loader"></div>
    <h2>Waiting for players...</h2>
    <p>Please wait while others join</p>
</div>
<div id="popup" class="popup hidden"></div>
</div>

<script src="js/app.js"></script>
</body>
</html>
